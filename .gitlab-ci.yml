variables:
  GITHUB_COMMIT_MESSAGE:
    description: "Message du commit poussé vers le GitHub (cf job push-to-github). Par défaut : $CI_COMMIT_REF_NAME (nom de la branche ou du tag)."
    value: $CI_COMMIT_REF_NAME
  OSS_MVN_DISABLE: "true"
  OSS_NPM_IMAGE:  node:18.16.1

include:
  - component: $CI_SERVER_FQDN/boost/ci-component/security/oss-npm@2.0.0
    inputs:
      oss_package_json : "package-lock.json"
  - component: '$CI_SERVER_FQDN/boost/ci-component/security/software-supply-chain-npm@1.4.0'
    inputs:
      ssc_lock_file: "package-lock.json"
  - component: $CI_SERVER_FQDN/boost/ci-component/security/dependency-track@2.0.0
  - component: $CI_SERVER_FQDN/boost/ci-component/security/cdxgen-sbom@2.0.1      
    inputs:
      exclude_paths: "MapStore2"

stages:
  - sast
  - post_sast
  - build
  - test
  - delivering

tabou2-front:build:
  stage: build
  image: node:18.16.1
  only:
    refs:
      - develop
      - main
  script:
    - git submodule update --init --recursive
    - npm ci
    - npm run ext:build
  artifacts:
    paths :
      - $CI_PROJECT_DIR/dist/Tabou2.zip


tabou2-front:sonar-analysis:
  stage: test
  image: sonarsource/sonar-scanner-cli
  script:
    - >
      sonar-scanner
      -Dsonar.host.url=${SONAR_URL}
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.projectKey=${SONAR_KEY}${CI_PROJECT_NAME}

## Livraison Github
push-to-github:
  image: maven:3.9.0-eclipse-temurin-17
  stage: delivering
  dependencies:
    - tabou2-front:build
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
  before_script:
    - apt update && apt install -y gettext-base
    - envsubst '${MVN_GROUP} ${MVN_RELEASE} ${MVN_SNAPSHOTS}' < pom.xml > pom.subst && mv -f pom.subst pom.xml
  script:
    - cd ci
    - apt install -y rsync
    - chmod +x push-to-github.sh
    - ./push-to-github.sh
  variables:
    SOURCE_REPOSITORY: $CI_PROJECT_DIR
    # Les variables GITHUB_RM_ACCOUNT, GITHUB_RM_LOGIN et GIT_TOKEN sont à définir manuellement avant de lancer le job
    GIT_REMOTE: "https://$GITHUB_RM_ACCOUNT:$GIT_TOKEN@github.com/sigrennesmetropole/geor_tabou2_front.git"
    COMMIT_MESSAGE: $GITHUB_COMMIT_MESSAGE
